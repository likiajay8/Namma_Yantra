{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center;">My Profile 👤</h2>

<div style="width:300px; margin:auto; padding:20px; box-shadow:2px 2px 10px gray; border-radius:10px;">

<form method="POST">

    Phone Number:<br>
    <input type="text" value="{{ user['mobile'] }}" readonly><br><br>

    Name:<br>
    <input type="text" name="name" value="{{ user['name'] or '' }}" required><br><br>

    <div style="text-align:center;">

        <button type="submit" style="background-color:rgb(12, 73, 12); color:white; padding:8px 20px; border:none; border-radius:5px;">
            Save
        </button>
    </div>
    
</form>

</div>

<br>
<div style="text-align:center;">
    <a href="{{ url_for('home') }}" style="color:blue; text-decoration:underline;">
        Back to Home
    </a>
</div>

{% endblock %}
